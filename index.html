<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro - Hourly Reset Edition</title>
    
    <script src='//libtl.com/sdk.js' data-zone='10785999' data-sdk='show_10785999'></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10786203' data-sdk='show_10786203'></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --primary-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --accent-blue: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            --accent-gold: linear-gradient(90deg, #f59e0b 0%, #d97706 100%);
            --accent-purple: linear-gradient(90deg, #8b5cf6 0%, #6d28d9 100%);
            --text-gold: #fbbf24;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background: #020617; color: #f8fafc;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 88%; margin-top: 25px; padding: 35px 20px;
            background: var(--primary-grad); border-radius: 28px;
            text-align: center; border: 1px solid var(--glass-border);
        }

        .balance-value { font-size: 45px; font-weight: 800; color: var(--text-gold); margin: 10px 0; }

        .premium-card {
            width: 85%; background: var(--glass);
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 22px; margin-top: 18px;
        }

        .limit-info { font-size: 11px; color: #94a3b8; margin-bottom: 5px; text-align: right; font-weight: bold; }
        .reset-timer { font-size: 10px; color: #fb7185; text-align: center; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-size: 14px; font-weight: 700; cursor: pointer;
            text-transform: uppercase; color: white; margin-bottom: 15px;
        }

        .btn-inter { background: var(--accent-blue); }
        .btn-popup { background: var(--accent-gold); }
        .btn-inapp { background: var(--accent-purple); }
        .btn:disabled { background: #1e293b !important; color: #475569; cursor: not-allowed; opacity: 0.7; }

        .withdraw-area { display: none; margin-top: 15px; }
        input, select {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            padding: 14px; border-radius: 12px; color: white; margin-bottom: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div style="font-size: 11px; color: #94a3b8; letter-spacing: 2px;">TOTAL ASSETS</div>
        <div class="balance-value">৳ <span id="userBalance">0.00</span></div>
        <div class="reset-timer" id="nextReset">Checking timer...</div>
    </div>

    <div class="premium-card">
        <h3 style="margin: 0 0 15px 0; font-size: 18px;">Earning Stations</h3>
        
        <div class="limit-info">Inter: <span id="countInter">0</span>/30</div>
        <button class="btn btn-inter" id="btnInter" onclick="runInterstitial()">Rewarded Interstitial</button>

        <div class="limit-info">Popup: <span id="countPop">0</span>/30</div>
        <button class="btn btn-popup" id="btnPop" onclick="runPopup()">Rewarded Popup</button>

        <div class="limit-info">In-App: <span id="countInApp">0</span>/30</div>
        <button class="btn btn-inapp" id="btnInApp" onclick="runInApp()">In-App Interstitial</button>
    </div>

    <div class="premium-card" style="margin-bottom: 40px;">
        <button class="btn" style="background: transparent; border: 1px solid var(--glass-border); color: #94a3b8;" onclick="toggleWithdraw()">Withdraw Assets</button>
        <div id="withdrawSection" class="withdraw-area">
            <select id="method"><option value="Bkash">Bkash</option><option value="Nagad">Nagad</option></select>
            <input type="number" id="walletNum" placeholder="Wallet Number">
            <input type="number" id="amount" placeholder="Min ৳ 10">
            <button class="btn" style="background: #fff; color: #000; margin-top: 10px;" onclick="submitWithdraw()">Confirm</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const MAX_LIMIT = 30;
        const RESET_TIME = 60 * 60 * 1000; // 1 Hour in milliseconds

        let balance = parseFloat(localStorage.getItem('user_balance')) || 0;
        let limits = JSON.parse(localStorage.getItem('ad_limits')) || { inter: 0, pop: 0, inApp: 0 };
        let lastReset = parseInt(localStorage.getItem('last_reset_time')) || Date.now();

        function checkAndResetLimits() {
            const now = Date.now();
            if (now - lastReset >= RESET_TIME) {
                // Time to reset!
                limits = { inter: 0, pop: 0, inApp: 0 };
                lastReset = now;
                localStorage.setItem('last_reset_time', lastReset);
                saveState();
                tg.showAlert("Good news! Your hourly ad limits have been reset.");
            }
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const now = Date.now();
            const remaining = RESET_TIME - (now - lastReset);
            if (remaining > 0) {
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                document.getElementById('nextReset').innerText = `Limits reset in: ${mins}m ${secs}s`;
            } else {
                document.getElementById('nextReset').innerText = `Resetting limits...`;
                checkAndResetLimits();
            }
        }

        function updateUI() {
            document.getElementById('userBalance').innerText = balance.toFixed(2);
            document.getElementById('countInter').innerText = limits.inter;
            document.getElementById('countPop').innerText = limits.pop;
            document.getElementById('countInApp').innerText = limits.inApp;

            // Reset button states
            ['btnInter', 'btnPop', 'btnInApp'].forEach(id => {
                const b = document.getElementById(id);
                b.disabled = false;
                if (id === 'btnInter') b.innerText = "Rewarded Interstitial";
                if (id === 'btnPop') b.innerText = "Rewarded Popup";
                if (id === 'btnInApp') b.innerText = "In-App Interstitial";
            });

            if(limits.inter >= MAX_LIMIT) setLimitReached('btnInter');
            if(limits.pop >= MAX_LIMIT) setLimitReached('btnPop');
            if(limits.inApp >= MAX_LIMIT) setLimitReached('btnInApp');
        }

        function setLimitReached(id) {
            const b = document.getElementById(id);
            b.disabled = true;
            b.innerText = "Limit Reached";
        }

        function saveState() {
            localStorage.setItem('user_balance', balance.toFixed(2));
            localStorage.setItem('ad_limits', JSON.stringify(limits));
            updateUI();
        }

        function grantReward(type) {
            balance += 0.30;
            limits[type]++;
            saveState();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function runInterstitial() {
            if(limits.inter >= MAX_LIMIT) return;
            if (typeof show_10786203 === 'function') {
                show_10786203().then(() => grantReward('inter')).catch(() => tg.showAlert("Ad not ready."));
            }
        }

        function runPopup() {
            if(limits.pop >= MAX_LIMIT) return;
            if (typeof show_10785999 === 'function') {
                show_10785999('pop').then(() => grantReward('pop')).catch(() => tg.showAlert("Popup not ready."));
            }
        }

        function runInApp() {
            if(limits.inApp >= MAX_LIMIT) return;
            if (typeof show_10785999 === 'function') {
                show_10785999({ type: 'inApp', inAppSettings: { frequency: 1, capping: 0.1, interval: 30, timeout: 5, everyPage: false } });
                grantReward('inApp');
            }
        }

        function toggleWithdraw() {
            const sec = document.getElementById('withdrawSection');
            sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
        }

        function submitWithdraw() {
            const amt = parseFloat(document.getElementById('amount').value);
            if (amt < 10) { tg.showAlert("Min ৳ 10"); return; }
            if (balance < amt) { tg.showAlert("Insufficient assets!"); return; }
            balance -= amt;
            saveState();
            tg.showAlert("Success! Withdrawal request sent.");
        }

        // Initialize
        window.onload = () => {
            updateUI();
            setInterval(updateTimerDisplay, 1000);
            checkAndResetLimits();
        };
    </script>
</body>
</html>
