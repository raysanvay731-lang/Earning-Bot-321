<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10786203' data-sdk='show_10786203'></script>
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a; /* Deep Dark Blue Background */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Top Premium Card */
        .header-card {
            width: 90%;
            margin-top: 20px;
            padding: 30px 20px;
            background: var(--primary-grad);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .balance-label { font-size: 14px; opacity: 0.8; letter-spacing: 1px; text-transform: uppercase; }
        .balance-value { font-size: 42px; font-weight: 800; margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        /* Glassmorphism Sections */
        .glass-box {
            width: 85%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h3 { margin: 0 0 10px 0; font-size: 18px; color: var(--accent-color); }
        p { font-size: 13px; color: #cbd5e1; margin-bottom: 15px; }

        /* Premium Buttons */
        .btn-premium {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-ad {
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        .btn-withdraw {
            background: var(--glass);
            color: white;
            border: 1px solid var(--glass-border);
            margin-top: 15px;
        }

        .btn-premium:active { transform: scale(0.96); opacity: 0.9; }

        /* Input Fields */
        .input-group { display: none; margin-top: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--accent-color); }

        .timer-badge {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header-card">
        <div class="balance-label">Available Balance</div>
        <div class="balance-value">৳ <span id="userBalance">0.00</span></div>
        <div class="timer-badge">Next AD in <span id="countdown">10</span>s</div>
    </div>

    <div class="glass-box">
        <h3>Premium Rewards</h3>
        <p>Watch a sponsored video to instantly credit <b>৳ 0.30</b> to your luxury wallet.</p>
        <button class="btn-premium btn-ad" onclick="manualAd()">Claim Reward Now</button>
    </div>

    <div class="glass-box">
        <h3>Cash Out</h3>
        <p>Minimum threshold: ৳ 10.00</p>
        <button class="btn-premium btn-withdraw" onclick="toggleWithdraw()">Access Withdraw</button>
        
        <div id="withdrawSection" class="input-group">
            <select id="method">
                <option value="Bkash">Bkash Premium</option>
                <option value="Nagad">Nagad Fast</option>
                <option value="Rocket">Rocket Pay</option>
            </select>
            <input type="number" id="walletNum" placeholder="Account Number (01xxx...)">
            <input type="number" id="amount" placeholder="Amount (Min ৳ 10)">
            <button class="btn-premium btn-ad" style="background: white; color: black;" onclick="submitWithdraw()">Confirm Transfer</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#0f172a";

        let currentBalance = parseFloat(localStorage.getItem('user_balance')) || 0;
        let timeLeft = 10;

        function updateUI() {
            document.getElementById('userBalance').innerText = currentBalance.toFixed(2);
        }
        updateUI();

        // Timer Automation
        function startTimer() {
            let timer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    autoShowAd();
                }
            }, 1000);
        }

        function autoShowAd() {
            if (typeof show_10786203 === 'function') {
                show_10786203().then(() => { addReward(); }).catch(() => { addReward(); });
            } else {
                setTimeout(resetTimer, 3000);
            }
        }

        function manualAd() { autoShowAd(); }

        function addReward() {
            currentBalance += 0.30;
            localStorage.setItem('user_balance', currentBalance.toFixed(2));
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Excellent! ৳ 0.30 added to your balance.");
            resetTimer();
        }

        function resetTimer() { timeLeft = 10; startTimer(); }

        function toggleWithdraw() {
            const section = document.getElementById('withdrawSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        }

        function submitWithdraw() {
            const num = document.getElementById('walletNum').value;
            const amt = parseFloat(document.getElementById('amount').value);

            if (amt < 10) { tg.showAlert("Min withdraw is ৳ 10"); return; }
            if (currentBalance < amt) { tg.showAlert("Insufficient Balance!"); return; }
            if (num.length < 11) { tg.showAlert("Invalid Number!"); return; }

            currentBalance -= amt;
            localStorage.setItem('user_balance', currentBalance.toFixed(2));
            updateUI();
            tg.showAlert("Success! Your withdrawal request is being processed.");
            toggleWithdraw();
        }

        window.onload = startTimer;
    </script>
</body>
</html>
